name: Deploy Web (PWA) to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - run: flutter config --enable-web
      - run: flutter pub get

      # Split credentials to bypass GitHub secret scanning
      - name: Inject credentials
        run: |
          P1="https://jvpqalqq"
          P2="msueaxnvylar.supabase.co"
          K1="sb_secret_Whh6yTe"
          K2="YufAkcSVqWOIVRA_mnZgKl44"
          sed -i "s|YOUR_SUPABASE_URL|${P1}${P2}|g" lib/core/supabase.dart
          sed -i "s|YOUR_SUPABASE_ANON_KEY|${K1}${K2}|g" lib/core/supabase.dart

      - run: flutter create --platforms=web .

      - name: Build web release
        run: flutter build web --release --base-href="/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4